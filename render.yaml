services:
  - type: web
    name: mobilniaga-marketplace-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn marketplace_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - fromGroup: mobilniaga-db

  - type: web
    name: mobilniaga-seller-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn seller_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - fromGroup: mobilniaga-db

  - type: web
    name: mobilniaga-payment-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn payment_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - fromGroup: mobilniaga-db

  - type: web
    name: mobilniaga-delivery-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn delivery_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - fromGroup: mobilniaga-db